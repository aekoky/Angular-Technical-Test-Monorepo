@if (vm$ | async; as vm) {
<div class="option-selector">
    <div class="option-group">
        <h3 class="option-group__title">front salto's:</h3>
        <div class="option-group__grid">
            @for (option of vm.frontOptions; track option.id) {
            <button type="button" class="option-btn" [class.option-btn--selected]="option.id === vm.selectedOptionId"
                (click)="onSelect(option.id, vm.activeBoxId)">
                {{ option.label }}
            </button>
            }
        </div>
    </div>
    <div class="option-group">
        <h3 class="option-group__title">back salto's:</h3>
        <div class="option-group__grid">
            @for (option of vm.backOptions; track option.id) {
            <button type="button" class="option-btn" [class.option-btn--selected]="option.id === vm.selectedOptionId"
                (click)="onSelect(option.id, vm.activeBoxId)">
                {{ option.label }}
            </button>
            }
        </div>
    </div>
    <div class="option-group">
        <h3 class="option-group__title">Other:</h3>
        <div class="option-group__grid">
            @for (option of vm.otherOptions; track option.id) {
            <button type="button" class="option-btn" [class.option-btn--selected]="option.id === vm.selectedOptionId"
                (click)="onSelect(option.id, vm.activeBoxId)">
                {{ option.label }}
            </button>
            }
        </div>
    </div>
</div>
}
